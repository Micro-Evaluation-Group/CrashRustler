name: Security Audit

on:
  schedule:
    - cron: '0 8 * * 1' # Weekly on Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cargo-audit
        run: cargo install cargo-audit@0.22.1 --locked

      - name: Security audit
        run: cargo audit
