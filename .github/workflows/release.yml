name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify Cargo.toml version matches tag
        run: |
          cargo_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          tag_version="${{ steps.version.outputs.version }}"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "::error::Cargo.toml version ($cargo_version) does not match tag version ($tag_version)"
            echo "Update Cargo.toml version to $tag_version before tagging."
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: Security audit
        run: |
          cargo install cargo-audit@0.22.1 --locked
          cargo audit

      - name: Test
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Generate docs
        run: cargo doc --no-deps

      - name: Package binary
        run: |
          cd target/release
          tar czf ../../exc_handler-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz exc_handler
          cd ../..

      - name: Package docs
        run: tar czf docs-${{ github.ref_name }}.tar.gz -C target doc

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          generate_release_notes: true
          files: |
            exc_handler-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
            docs-${{ github.ref_name }}.tar.gz
