name: Release
run-name: >-
  ${{ inputs.tag && format('Publish {0} to crates.io', inputs.tag) || format('Release {0}', github.ref_name) }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0) — must already exist'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Resolve tag
        id: tag
        run: echo "name=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        if: inputs.tag
        run: git checkout "refs/tags/${{ inputs.tag }}"

      - name: Extract version from tag
        id: version
        run: echo "version=${{ steps.tag.outputs.name }}" | sed 's/=v/=/' >> "$GITHUB_OUTPUT"

      - name: Verify Cargo.toml version matches tag
        run: |
          cargo_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          tag_version="${{ steps.version.outputs.version }}"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "::error::Cargo.toml version ($cargo_version) does not match tag version ($tag_version)"
            echo "Update Cargo.toml version to $tag_version before tagging."
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: Security audit
        run: |
          cargo install cargo-audit@0.22.1 --locked
          cargo audit

      - name: Test
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Generate docs
        run: cargo doc --no-deps

      - name: Package binary
        run: |
          cd target/release
          tar czf ../../exc_handler-${{ steps.tag.outputs.name }}-aarch64-apple-darwin.tar.gz exc_handler
          cd ../..

      - name: Package docs
        run: tar czf docs-${{ steps.tag.outputs.name }}.tar.gz -C target doc

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            exc_handler-${{ steps.tag.outputs.name }}-aarch64-apple-darwin.tar.gz
            docs-${{ steps.tag.outputs.name }}.tar.gz

  publish:
    needs: release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@nightly

      - name: Publish to crates.io
        run: cargo publish --token "$CRATES_IO_TOKEN"
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
